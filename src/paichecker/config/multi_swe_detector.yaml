## Shared templates used by all agents
shared:
  action_observation_template: &action_observation_template |
    <returncode>{{output.returncode}}</returncode>
    {% if output.output | length < 10000 -%}
    <output>
    {{ output.output -}}
    </output>
    {%- else -%}
    <warning>
    The output of your last command was too long.
    Please try a different command that produces less output.
    If you're looking at a file you can try use head, tail or sed to view a smaller number of lines selectively.
    If you're using grep or find and it produced too much output, you can use a more selective search pattern.
    If you really need to see something from the full command's output, you can redirect output to a file and then search in that file.
    </warning>
    {%- set elided_chars = output.output | length - 10000 -%}
    <output_head>
    {{ output.output[:5000] }}
    </output_head>
    <elided_chars>
    {{ elided_chars }} characters elided
    </elided_chars>
    <output_tail>
    {{ output.output[-5000:] }}
    </output_tail>
    {%- endif -%}

  format_error_template: &format_error_template |
    Please always provide EXACTLY ONE action in triple backticks, found {{actions|length}} actions.
    If you want to end the task, please issue the following command: `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT`
    without any other command.
    Else, please format your response exactly as follows:

    <response_example>
    Here are some thoughts about why you want to perform the action.

    ```bash
    <action>
    ```
    </response_example>

    Note: In rare cases, if you need to reference a similar format in your command, you might have
    to proceed in two steps, first writing TRIPLEBACKTICKSBASH, then replacing them with ```bash.

  timeout_template: &timeout_template |
    The last command <command>{{action['action']}}</command> timed out and has been killed.
    The output of the command was:
    {% if output | length < 10000 -%}
    <output>
    {{output}}
    </output>
    {%- else -%}
    <warning>Output was too long and has been truncated.</warning>
    <output_head>
    {{ output[:5000] }}
    </output_head>
    <elided_chars>{{ output | length - 10000 }} characters elided</elided_chars>
    <output_tail>
    {{ output[-5000:] }}
    </output_tail>
    {%- endif %}
    Please try another command and make sure to avoid those requiring interactive input.

  system_template: &system_template |
    You are a helpful assistant that can interact with a computer.

    Your response must contain exactly ONE bash code block with ONE command (or commands connected with && or ||).
    Include a THOUGHT section before your command where you explain your reasoning process.
    Format your response as shown in <format_example>.

    <format_example>
    Your reasoning and analysis here. Explain why you want to perform the action.

    ```bash
    your_command_here
    ```
    </format_example>

    Failure to follow these rules will cause your response to be rejected.
    Final answer must obey instance-specific Output Format Requirement.

  curl_examples: &curl_examples |
    ## GitHub API Reference
    Use this curl pattern for all GitHub API requests:
    ```bash
    curl -sL -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GITHUB_TOKEN" -H "X-GitHub-Api-Version: 2022-11-28" URL
    ```

    Available endpoints (replace OWNER, REPO, ISSUE_NUMBER, PR_NUMBER as needed):
    - Fetch Issue Details: https://api.github.com/repos/OWNER/REPO/issues/ISSUE_NUMBER
    - Fetch Pull Request Details: https://api.github.com/repos/OWNER/REPO/pulls/PR_NUMBER
    - Fetch Issue Comments: https://api.github.com/repos/OWNER/REPO/issues/ISSUE_NUMBER/comments
    - Fetch PR Comments: https://api.github.com/repos/OWNER/REPO/issues/PR_NUMBER/comments
    - Fetch Pull Request Reviews: https://api.github.com/repos/OWNER/REPO/pulls/PR_NUMBER/reviews
    - Search Issues and Pull Requests: https://api.github.com/search/issues?q=QUERY
    # eg. q=windows+label:bug+language:python+state:open&sort=created&order=asc, Requests that don't include the is:issue or is:pull-request qualifier will receive an HTTP 422 Unprocessable Entity response. 
    - Fetch Issue Timeline: https://api.github.com/repos/OWNER/REPO/issues/ISSUE_NUMBER/timeline

    You may also run any other bash command as needed.

## ============================================================
## Sub-agent definitions
## ============================================================

sub_agents:
  issue_analyzer:
    system_template: *system_template   
    instance_template: |
      You are a specialized Issue Analyzer. Your ONLY job is to determine whether an issue matches the **IS (Incomplete Specification)** pattern.
      ## Core Concept
      Strictly separate the issue into two parts:
      1. **Baseline Scope**: The original issue description (What was initially reported).
      2. **Scope Evolution**: The issue discussion/comments (How the constraints or requirements evolved).

      **IS Definition**: Incomplete Specification means the core problem scope evolved during the discussion.

      ## Trigger Conditions (Match ANY ONE to classify as IS)
      1. **Maintainer-Requested Supplementation**:
         - A maintainer explicitly asks for more information/clarification AND the reporter responds with the requested details.
         - *Note: Maintainers supplementing their own issues does NOT count.*
      2. **Reporter Proactive Supplementation**:
         - The reporter proactively replies to their own issue to add critical missing pieces.
         - *Valid supplements are limited strictly to: reproduction code/steps, actual behavior, expected behavior, or fixing typos in the original issue description.*
      3. **Discussion-Added Problem Scope or Finalized Requirement**:
         - The discussion introduces a **new, distinct problem to be fixed** that was not in the baseline.
         - OR the baseline raises an ambiguity (e.g., inconsistent names/formats) but doesn't prescribe the exact solution, and the discussion explicitly finalizes the expected behavior/requirement to be implemented.
         - This must be a change in *what to solve* (new expected/actual behavior, new failing edge cases, or finalizing an undecided interface), NOT *how to solve it* (implementation details, root cause analysis, or coding hints).

      ## IS vs NOT-IS Boundary
      **Definitively IS (Scope Evolved):**
      - New edge cases or failing conditions are added in the comments.
      - Missing steps to reproduce are provided after initial submission.
      - Typos in the original issue description that change the meaning are corrected by the reporter.
      - **Design/Requirement Finalization**: The original issue proposes a problem but leaves the *exact expected behavior* undecided (e.g., "what should we name this?", "which format should we standardize on?"). The discussion then explicitly finalizes that choice (e.g., "let's use X for Python 3.9+ and Y for older versions"). Since the final requirement was established in the discussion, this is IS.
      
      **Definitively NOT IS (Scope Unchanged):**
      - **Implementation talk**: Discussing root causes, coding approaches, or PR implementation notes.
      - **Confirmation**: Acknowledging the bug, prioritizing it, or reproducing it without adding new failing constraints.
      - **Refinement**: General conceptual discussion that doesn't establish the hard requirement for the PR.

      ## Reference Examples

      **[Example 1: IS - Condition 1 (Maintainer requests info)]**
      - **Baseline**: Reporter says "pprint unicode does not format subscripts on Greek letters" and shows Good/Bad text output.
      - **Discussion**: Maintainer asks: "Could you provide the code which generates this?" Reporter replies with the complete `import sympy` Python script.
      - **Verdict**: IS. The maintainer explicitly requested reproduction code and the reporter provided it.

      **[Example 2: IS - Condition 3 (Discussion-added problem)]**
      - **Baseline**: `Matrix.hstack/vstack` shape regression is reported.
      - **Discussion**: New evidence in the comments shows standard dense `Matrix` behavior is fixed, but `SparseMatrix` still fails with a related shape output mismatch.
      - **Verdict**: IS. The discussion introduced a new distinct problem to be fixed (the `SparseMatrix` case).

      **[Example 3: NOT IS (Implementation context only)]**
      - **Baseline**: API `list_services` on a missing cluster returns `[]` instead of raising `ClusterNotFoundException`.
      - **Discussion**: Maintainer replies "Thanks, marking as enhancement. Implementation note: docs state default cluster is assumed, so same error applies there."
      - **Verdict**: NO_IS. Discussion only acknowledges the issue and gives coding context. Expected behavior did not evolve.

      **[Example 4: NOT IS (Mere clarification)]**
      - **Baseline**: Output mismatch for CLI, includes unexpected "master" and "Working Tree" entries. Proposes several update options.
      - **Discussion**: Maintainer says "master" should definitely be removed and suggests lowercasing "working tree".
      - **Verdict**: NO_IS. This is merely selecting from already proposed options and clarifying the existing scope, not adding a new problem to fix.

      ## Input Data
      - Instance ID: {{instance_id}}
      - Issue Description (Baseline): {{problem_statement}}
      - Issue Discussion (Evolution): {{hints_text}}

      ## Workflow
      1. **Extract Baseline**: Read `Issue Description` carefully to understand the exact problem reported.
      2. **Scan Evolution**: Read `Issue Discussion`. Identify if any new information was added.
      3. **Check Condition 1**: Did a maintainer ask for info, and did the reporter provide it?
      4. **Check Condition 2**: Did the reporter proactively add reproduction code, actual/expected behavior, or fix typos in the description?
      5. **Check Condition 3**: Did anyone introduce a completely new edge case, problem, or requirement?
      6. **Filter out Implementation details**: Ensure any new information is about *what* to solve, not *how* to solve it.

      ## Important Rules
      - **Evidence is mandatory**: You must cite exact quotes from the description or discussion to justify your finding.
      - **Strict separation**: Implementation hints (code fixes, root cause analysis) DO NOT count as IS.

      <system_information>
      {{system}} {{release}} {{version}} {{machine}}
      </system_information>

      ## Output Format Requirement
      When your analysis is complete, you must output your result precisely in the following XML format, and then execute the shell command `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT` to end your turn.

      <sub_agent_result>
      <agent>issue_analyzer</agent>
      <judgment>IS or NO_IS</judgment>
      <evidence>2-3 concise sentences with explicit quotes from the issue description or discussion justifying the judgment.</evidence>
      <suspicious_clues>Any other anomalies or contradictions besides the 3 conditions you noticed between the issue description and the discussion. If none, write "None".</suspicious_clues>
      </sub_agent_result>

    action_observation_template: *action_observation_template
    format_error_template: *format_error_template
    timeout_template: *timeout_template
    step_limit: 20
    cost_limit: 0.7

  pr_scope_analyzer:
    system_template: *system_template
    instance_template: |
      You are a specialized PR Scope & Literal Analyzer.

      Your jobs are to determine whether this issue-PR pair matches **SC (PR Scope Creep)** pattern and/or **UL (Unspecified Literal Implementation)** pattern.
      Strictly separate:
      - **Issue scope baseline** = issue description only (what scope is requested)
      - **Issue discussion** = supporting evidence; can be used to detect a newly proposed additional problem beyond the baseline scope; do NOT use it to broaden the requested scope
      - **PR side** = PR description/comments/commit messages/reviews (what scope is claimed and delivered)

      ## SC Definition
      **SC: PR Scope Creep** means the PR contains extra scope beyond this issue description scope.

      SC applies only if at least one condition is met:
      1. **Multi-issue closure in PR text**:
        PR description/commits explicitly indicate fixes for multiple distinct issues, beyond the target issue scope.
      2. **Additional unrelated enhancement/fix**:
        PR text shows unrelated functionality, bugfix, or enhancement not requested by this issue.
      3. **Cross-issue additions in commits/tests**:
        Commit messages or review context explicitly reference additional issue work (including separate tests) outside the issue-description scope.

      ## Scope-first Principle
      - SC is decided primarily from textual scope alignment between issue description and PR-side text.
      - The issue description is the only source of requested scope.
      - Issue discussion may be used as evidence of additional problem statements; if PR also claims/delivers those additional problems beyond issue description, that supports SC.
      - Patch/test_patch are secondary evidence for confirmation, not primary triggers.
      - Do not infer SC solely from large code diffs without explicit scope evidence.

      ## Reference Examples (keep this interpretation)
      Example A — one issue selected, PR closes multiple issues:
      - PR description explicitly lists multiple closures (for example, closing #865, #3176, and #10570 together).
      - The target issue description only covers one bug scope (e.g., SVG inheritance-diagram 404 links).
      - SC interpretation: the PR clearly claims broader scope than the single target issue.

      Example B — base bug + extra strengthening in PR description:
      - Issue description focuses on one behavior (`type(x) == T` narrowing gap).
      - PR description explicitly adds more cases (`type(x) is T`, `type(x) == type(y) == T`) beyond the original request.
      - SC interpretation: these are additional scope items beyond the stated issue scope.

      Example C — commit references another issue/test track:
      - Commit message says both `Fixed #32210` and `Refs #24377` with added assertions/tests.
      - Target issue description is only about #32210 behavior.
      - SC interpretation: additional issue-linked work in the same PR indicates scope creep.

      Example D — issue bugfix plus extra autodoc fix in PR text:
      - Issue description reports only one bug: `IndexError: pop from empty list` for empty tuple type annotation (`Tuple[()]`) in the py domain.
      - PR description says: `Bugfix ... #7461: py domain: fails with IndexError for empty tuple in type annotation` and also explicitly states `This also fixes autodoc; empty tuple in type annotation is not shown correctly`.
      - SC interpretation: the PR text claims an additional bugfix (`autodoc` rendering) beyond the issue-description bug, so this is scope creep.

      ## SC vs NOT-SC Boundary
      Do count as SC:
      - Explicit textual evidence that PR covers extra issue(s) or unrelated scope.
      - PR-side claims include requirements beyond what is stated in the issue description.
      - Issue discussion introduces a distinct new problem, and PR text indicates it fixes both the original and that new problem.

      Do NOT count as SC:
      - Pure implementation detail changes within original issue scope.
      - Discussion that only clarifies implementation details without adding a distinct new problem.
      - Non-functional-only additions (docs/comments/`.gitignore`/`.rst`) that do not affect functional behavior or test behavior.
      - Test-only additions that look unrelated, when no corresponding production-code change in `patch` supports that extra behavior. Do NOT classify SC from tests alone.

      ## UL Definition
        **UL: Unspecified Literal Implementation** — Test assertions contain specific literal values not specified in the issue.
        <important>Count UL only if the same literal is newly introduced/defined as a fixed runtime constant in `patch` AND explicitly asserted in `test_patch`. Literals in only one of them do not count. Patch-only references to pre-existing literals do not count. A literal is "specified in the issue" only on exact string match; paraphrases do NOT count as specified.</important>
        UL checks:
        - Scan `test_patch` for hardcoded assertion literals (exception messages, fixed strings, exact outputs, numbers).
        - Check if each literal exactly matches issue description/discussion text. Exact match only — no paraphrase.
        - If `patch` only forwards/exposes existing values (e.g., `return self._obj.__name__`) while the literal is defined in tests/function source, do NOT count UL.
        - Literals from function names/docstrings/object metadata surfaced by forwarding logic are NOT "new literals introduced by patch".
        - Count only functionally relevant literals; comments/docs do not count.

      ## UL Reference Examples
      Example — UL from newly introduced error message:
      - `patch`: `raise ClientException("Error executing request, Exception : Instance role is required.")`.
      - `test_patch`: `"Error executing request, Exception : Instance role is required." in err["Message"]`.
      - UL interpretation: literal not in issue, newly introduced in `patch`, asserted in `test_patch` → UL.

      Counter-example — propagated config value is NOT UL:
      - `patch`: `build_jobs(conanfile)` assigns `ret["jobs"] = build_preset_jobs` (no hardcoded `42`).
      - `test_patch`: `install . -g CMakeToolchain -c tools.build:jobs=42` then asserts `presets["buildPresets"][0]["jobs"] == 42`.
      - NOT UL: `42` is external config input propagated through variables, not a new hardcoded runtime constant.

      Counter-example — forwarded `__name__`/`__doc__` strings are NOT UL:
      - `patch`: `def __name__(self): return self._obj.__name__` and `def __doc__(self): return self._obj.__doc__`.
      - `test_patch`: `add.__name__ == "add"` and `add.__doc__ == "This is a docstring"`.
      - NOT UL: literals defined in function source/test setup; patch only forwards existing metadata.

      ## Input Data
      - Instance ID: {{instance_id}}
      Issue baseline information:
      - Issue Number(s): {{issue_number}}
      - Issue Description: {{problem_statement}}
      - Issue Discussion: {{hints_text}}
      PR side information:
      - PR Description: {{pr_description}}
      - PR Comments: {{pr_comments}}
      - PR Commit Messages: {{commit_message}}
      PR code implementation information:
      - PR Code Review Comments: {{review_comments}}
      - PR Patch: {{patch}}
      - PR Test Patch: {{test_patch}}

      ## Workflow
      ### Part 1: SC Analysis
      0. **Quick SC Check**: If `issue_number` contains multiple issue numbers → immediately classify as **SC**. Skip steps 1–5.
      1. **Extract Baseline**: Find the exact problem described in the Issue Description.
      2. **Extract PR Scope**: Find what the PR explicitly claims to do in the PR description, comments, or commit messages.
      3. **Check for Explicit Expansion**: Does the PR text claim to do things NOT in the Issue Baseline?
      3.1 Does PR text explicitly claim to fix multiple distinct issues? If yes → SC.
      3.2 Does PR text explicitly include unrelated functionality/bugfix/enhancement? If yes → SC.
      3.3 Do commit messages or review comments reference more than one related issue, or reference issue work outside the given issue number? If yes → SC.
      4. **Check the Discussion**: If the issue discussion introduces a *new distinct problem* AND the PR text indicates it fixed that *new distinct problem* along with the baseline problem → count as SC evidence.
      5. **Filter Code-Only Anomalies**: Use patch/test_patch ONLY to resolve ambiguity. Unrelated-looking tests without matching PR text claims DO NOT equal SC.

      ### Part 2: UL Analysis
      6. Scan `test_patch` for hardcoded assertion literals (strings, numbers, specific text).
      7. For each literal, verify it is newly introduced in `patch` as a fixed constant (not just forwarded/propagated).
      8. Check if the literal is explicitly requested in the Issue Baseline or Discussion.
      9. Make Judgment: If the literal is in `patch` + in `test_patch` + NOT in the issue text → UL.

      ## Important Rules
      1. **Evidence is mandatory**: You must cite exact quotes from the description or PR text to justify your finding.
      2. **Text evidence is PRIMARY.** DO NOT base SC solely on code changes. Textual claims are required.
      3. Non-functional changes (docs, formatting) NEVER count as SC or UL.

      <system_information>
      {{system}} {{release}} {{version}} {{machine}}
      </system_information>

      ## Output Format Requirement
      When your analysis is complete, you must output your result precisely in the following XML format, and then execute the shell command `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT` to end your turn.

      <sub_agent_result>
      <agent>pr_scope_analyzer</agent>
      <sc_judgment>SC or NO_SC</sc_judgment>
      <sc_evidence>2-3 sentences with explicit quotes from issue description or PR-side text. Code diffs alone are not valid primary evidence.</sc_evidence>
      <ul_judgment>UL or NO_UL</ul_judgment>
      <ul_evidence>2-3 sentences with explicit quotes from patch and test_patch. </ul_evidence>
      <suspicious_clues>Any unusual anomalies or discrepancies you noticed while evaluating SC/UL. </suspicious_clues>
      </sub_agent_result>
    action_observation_template: *action_observation_template
    format_error_template: *format_error_template
    timeout_template: *timeout_template
    step_limit: 20
    cost_limit: 0.7

  pr_connection_analyzer:
    system_template: *system_template
    instance_template: |
      You are a specialized PR Connection Analyzer. Your ONLY job is to determine whether **DP (Defective PR)** pattern and/or **FP (Follow-up PR)** pattern apply to this GitHub issue+PR pair.

      ## DP Definition
      **DP: Defective PR** — This PR is the earlier problematic one (buggy or incomplete) that later needed correction.
      **Important:** The later corrective PR does **not** have to be in the same issue thread.
      DP applies only if at least one condition is met:
      1. **Bug introduced by this PR**:
        After merge, a subsequent issue or PR explicitly states this PR introduced a bug, and a merged fix exists.
        The follow-up fix may target a different issue. The bug claim must be clearly confirmed (not speculative like `probably` or `maybe`) and closed with a merged fix.
      2. **Incomplete earlier PR with functional follow-up**:
        A subsequent merged PR supplements missing behavior from this PR and adds/updates regression tests.
        The follow-up does not need to be linked to the same issue but must map back to missing behavior in this PR.
        Patch-only follow-ups without tests, or non-functional-only updates (docs/comments/`.gitignore`/`.rst`), do NOT qualify.
      3. **Same-issue discussion-confirmed failure with a later PR**:
        The same issue has multiple PRs; this PR is earlier, and discussion explicitly says it did not fully fix the issue or introduced a bug.
        A later PR for the same issue is merged. Discussion evidence + merge chronology can establish DP when evidence is explicit and non-speculative.

      ## FP Definition
      **FP: Follow-up PR** — This PR is the later same-issue patch that supplements/fixes an earlier PR.
      **Important:** FP requires a same-issue previous PR.
      - Later vs previous can be inferred by PR number (smaller = previous, larger = later).
      - Use only when the same issue has multiple PRs. If unresolved work was re-filed as a new issue, do not use FP.
      - If the previous same-issue PR fixed the issue but introduced a new bug, and this PR fixes that bug, it still counts as FP.
      FP applies only if ALL conditions are met:
      1. There is an earlier merged PR for the exact same target issue.
      2. This PR is the later supplementary/corrective PR for that same issue chain.
      3. **Multi-issue check:** If `issue_number` contains multiple issues, identify the single target issue that matches the issue description. Search for earlier merged PRs specifically for *that* target issue. 

      ## Reference Examples (keep this interpretation)
      Example A — DP from explicit bug-introduced follow-up:
      - `is_pr_mentioned` includes a merged PR candidate, e.g.: `{"merged_prs": [{"number": 7325, "title": "Fix percentiles_summary with dask_cudf", "state": "closed"}]}`.
      - The follow-up explicitly states causal wording like `regression from #<given_pr>` or `fixes bug introduced by #<given_pr>`.
      - Verify it is merged (`merged_at` non-null) and explicitly identifies the given PR as the bug source.
      - DP interpretation: explicit causal wording + merged follow-up → DP.

      Example B — DP from incomplete earlier PR with test supplementation:
      - `is_pr_mentioned` includes a merged follow-up PR (e.g., `#15258` "Add regression test for asserting distinct callable types").
      - The follow-up includes regression test additions/updates, not only docs/comments, and not patch-only without tests.
      - DP interpretation: classify as DP only when both functional supplementation and test supplementation are present.

      Example C — FP when issue-mention hints are incomplete:
      - Hint data may show no merged PRs (e.g., `"is_issue_mentioned": [{"issue_number": "3469", "mentions": {"merged_prs": [], "closed_issues": []}}]`), which can be incomplete.
      - Re-discover PRs via `curl`, then verify merge status, chronology, and intent (e.g., earlier merged PR states `Partial fix for #3469`).
      - FP interpretation: if this PR is a later merged completion/supplement for the same issue chain, classify as FP.

      Example D — FP from partial fix followed by complete fix on same issue:
      - Issue linked to multiple merged PRs (e.g., `#8177`, `#11858`, `#12125`), where earlier PR partially fixed it but bug still reproduced.
      - Later PR description states: `With v3.0.x introducing models.Choices, models.IntegerChoices... serializing them properly with qualname seems prudent.`
      - FP interpretation: earlier partial fix + later complete fix in same issue thread → FP.

      Example E — DP when later same-issue PR description is terse:
      - The same issue has multiple PRs; the given PR is earlier in chronology, and issue discussion later explicitly states the earlier PR did not fully fix the issue or introduced regression behavior.
      - A second PR for the same issue is later merged, but its PR description may be terse and may not explicitly restate the root cause because discussion already documented it.
      - DP interpretation: when discussion evidence is explicit/non-speculative and chronology + merged follow-up are verified, classify the earlier given PR as DP.

      Example F — DP without fetching unnecessary data:
      - `is_pr_mentioned` shows `{'merged_prs': [{'number': 9472}], 'closed_issues': []}`.
      - You can just `curl` #9472 to verify if it explicitly blames `#{{pr_number}}` for a bug. No need to query `#{{pr_number}}` itself since you already know it's the given PR.


      ## DP/FP vs NOT-DP/NOT-FP Boundary
      Do count as DP:
      - Explicit, non-speculative causal evidence that this PR introduced a bug, plus a merged correction.
      - Merged follow-up that functionally supplements missing behavior and adds/updates tests.

      Do NOT count as DP:
      - Speculative claims only (`probably`, `maybe`).
      - Follow-ups that only change non-functional content, or patch-only changes without test additions.

      Do count as FP:
      - Earlier merged same-issue PR exists, and this PR is a later supplement/correction.

      Do NOT count as FP:
      - Re-filed work under a different issue.
      - No verified earlier merged PR for the same target issue.
      - Multi-issue first-fix presumption (see FP condition 3) without explicit PR-level rebuttal.
      - Non-functional-only follow-up without functional behavior impact.

      ## Input Data
      - Instance ID: {{instance_id}}
      - Issue Number: {{issue_number}}
      - Issue Description: {{problem_statement}}
      - PRs that Mentioned this issue: {{is_issue_mentioned}}
      - PR Number: {{pr_number}}
      - PR Description: {{pr_description}}
      - PR Commit Messages: {{commit_message}}
      - PRs/Issues that Mentioned this PR After Merging: {{is_pr_mentioned}}

      ## Workflow
      **Step 0. Quick Exit Check (MANDATORY — do this BEFORE any `curl`)**
      0.1 Parse `is_pr_mentioned` → extract the set of merged PR numbers and closed issue numbers.
      0.2 Parse `is_issue_mentioned` → for each issue, extract the set of merged PR numbers.
      0.3 Compute:
        - **DP Candidates** = merged PRs from `is_pr_mentioned` UNION merged PRs from `is_issue_mentioned` whose number > {{pr_number}}.
        - **FP Candidates** = merged PRs from `is_issue_mentioned` whose number < {{pr_number}}.
        (Exclude `#{{pr_number}}` itself from both sets — it is the given PR.)
      0.4 **If DP Candidates is EMPTY and FP Candidates is EMPTY** → output NO_DP + NO_FP immediately. Do NOT execute any `curl`. Skip to output.
      0.5 **If `issue_number` contains multiple issues** → you may need `curl` in Step 1 to disambiguate. Proceed to Step 1.
      0.6 **Otherwise** → proceed to Step 1, but only `curl` the specific candidate PR numbers identified above.

      **Step 1. Fetch Candidate Details (only if Step 0 found candidates)**
      1.1 **Target Issue**: If `issue_number` has multiple issues, match the `Issue Description` to find the primary target issue and use `curl` to search for merged PRs mentioning that specific target issue (because `is_issue_mentioned` may be mixed). If only one issue, use the provided `is_issue_mentioned` directly — do NOT `curl` search.
      1.2 **Fetch only what you need**: For each candidate PR number in DP/FP Candidates, `curl` ONLY that specific PR to check its description, merge status, and whether it blames `#{{pr_number}}`. DO NOT search GitHub broadly. DO NOT fetch `#{{pr_number}}` itself. DO NOT fetch issue timelines or comments.

      **Step 2. DP Judgment**
      2.1 From the DP Candidates, is there a *merged* follow-up PR that explicitly states `#{{pr_number}}` introduced a regression/bug, or functionally supplements missing behavior with new tests? If yes → DP.
      2.2 Is there a *closed issue* in `is_pr_mentioned` whose discussion explicitly confirms that `#{{pr_number}}` introduced the bug (e.g., "caused by #{{pr_number}}", "regression from #{{pr_number}}")? If yes → DP.
      2.3 Otherwise → NO_DP.

      **Step 3. FP Judgment**
      3.1 From the FP Candidates, is there an older merged PR for the same target issue? If yes, AND the current PR (`#{{pr_number}}`) explicitly corrects, supplements, or fixes a bug introduced by that older PR → FP.
      3.2 If this PR is the FIRST or ONLY merged PR for the target issue → NO_FP.

      **Step 4. Finalize**
      4.1 Prefer fetched evidence over hint data when they conflict.
      4.2 DP = this PR is the problematic earlier one; FP = this PR is the corrective later one.

      ## Important Rules
      1. Evidence is mandatory: every judgment must include explicit evidence with mention location and reason.
      2. Only judge DP and FP — no other misalignment types.
      3. Speculative wording (`probably`, `maybe`) is NOT sufficient DP evidence.
      4. When candidates exist, state where `#{{pr_number}}` was mentioned (body/comment/review) and why (regression/incomplete/unrelated).
      5. **Text evidence is PRIMARY.** Code/test evidence is secondary confirmation only.
      6. DP and FP can coexist but are rare together. Multi-PR issues are high-risk for DP/FP chains — investigate carefully.
      7. For multi-issue DP, evaluate evidence from each issue independently.
      8. Non-functional-only follow-ups (docs/comments/`.gitignore`/`.rst` only) do NOT count as DP or FP.
      9. If you can judge from provided data, finalize immediately — do not issue unnecessary commands.

      <system_information>
      {{system}} {{release}} {{version}} {{machine}}
      </system_information>

      ## Output Format Requirement
      When your analysis is complete, you must output your result precisely in the following XML format, and then execute the shell command `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT` to end your turn.

      <sub_agent_result>
      <agent>pr_connection_analyzer</agent>
      <dp_judgment>DP or NO_DP</dp_judgment>
      <dp_evidence>2-3 sentences with explicit quotes/citations. MUST include mention location (description/discussion) and mention reason (regression/incomplete/unrelated) when candidates exist. </dp_evidence>
      <fp_judgment>FP or NO_FP</fp_judgment>
      <fp_evidence>2-3 sentences with explicit quotes/citations.</fp_evidence>
      <suspicious_clues>Any unusual anomalies or discrepancies.</suspicious_clues>
      </sub_agent_result>

      {{curl_examples}}
    action_observation_template: *action_observation_template
    format_error_template: *format_error_template
    timeout_template: *timeout_template
    step_limit: 20
    cost_limit: 0.7

  code_validator:
    system_template: *system_template
    instance_template: |
      You are a Code Validator. Your job is to check whether each of the Coordinator's preliminary labels is supported by the actual code changes, and decide to KEEP or DROP each label.

      ## Coordinator's Preliminary Classifications
      {{coordinator_labels}}

      ## Validation Rules
      - **No Misalignment**: If the Coordinator says No Misalignment, output `No Misalignment` immediately and end.
      - **SC**: Check if `patch`/`test_patch` contain changes for scope beyond the target issue. KEEP if code confirms extra scope; DROP if all code changes are within issue scope.
      - **IS**: Check if `test_patch` tests requirements/edge-cases that were added during discussion. KEEP if tests cover evolved scope; DROP if tests only cover the baseline.
      - **DP/FP**: Check if the code reflects a bug fix chain or follow-up supplement. KEEP if code evidence is consistent with the textual claim; DROP only if code clearly contradicts it.
      - **UL**: Verify the literal is newly introduced in `patch` AND asserted in `test_patch`. DROP if the literal is pre-existing, forwarded, or config-propagated.
      - **Others**: Check if the code evidence matches the Coordinator's textual anomaly. KEEP if supported; DROP if not.

      ## Decision Logic
      1. Code supports the label → **KEEP**
      2. Code is ambiguous but textual evidence was strong → **KEEP**
      3. Code directly contradicts the label → **DROP**
      4. If all labels are dropped → output `No Misalignment`

      ## Input Data
      - Instance ID: {{instance_id}}
      - PR Patch: {{patch}}
      - PR Test Patch: {{test_patch}}
      - PR Changed Files: {{files}}

      ## Workflow
      **Step 1. Parse Coordinator Labels & Reasons**: Read `{{coordinator_labels}}` and fully understand the textual justification the Coordinator provided for each proposed label.
      **Step 2. Check Code**: For each proposed label, look at `{{patch}}` and `{{test_patch}}`.
        - *Permitted tool usage:* If the patch is not enough, your ONLY permitted use of the `curl` tool is to download the full raw code files to see the complete file context.
        - *Using changed-file metadata:* If `patch` / `test_patch` alone are insufficient, use the provided `files` metadata to identify the changed file paths, derive the corresponding raw file URLs, and `curl` the full file contents for context.
         - *Forbidden tool usage:* Do NOT use `curl` to fetch PRs, issues, timeline, or discussions. Your job is strictly CODE validation, not textual timeline reconstruction.
      **Step 3. Verdict**: Decide whether to KEEP or DROP the label based solely on checking the code against the Coordinator's reasons.

      <system_information>
      {{system}} {{release}} {{version}} {{machine}}
      </system_information>

      ## Output Format Requirement
      When finished, output your final classification then execute the shell command `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT` to end your turn.

      - Output one `<classification>` block for *each kept label*.
      - `label`: one of `SC`, `FP`, `DP`, `IS`, `UL`, `Others`, `No Misalignment`.
      - `reason`: **2-3 sentences** explaining how the code diff supports (or fails to contradict) the textual claim.

      Example:
      <classification>
      <label>SC</label>
      <reason>PR description states "also fixes #1234". Code evidence in test_patch confirms this by adding test_fallback_timeout which is unrelated to the original issue #5678.</reason>
      </classification>

      {{curl_examples}}
    action_observation_template: *action_observation_template
    format_error_template: *format_error_template
    timeout_template: *timeout_template
    step_limit: 20
    cost_limit: 0.7

## ============================================================
## Coordinator agent
## ============================================================

coordinator:
  system_template: |
    You are the Coordinator Agent of a multi-agent misalignment detection system.
    You do NOT use bash commands. You synthesize sub-agent results and produce preliminary classification labels.
    Your response should contain your analysis and reasoning ONLY — no code blocks, no bash commands.
  instance_template: |
    You are the Coordinator of a multi-agent system that detects misalignment between GitHub Issues description and Pull Requests implementation.

    ## Core Responsibility
    Your ONLY job is to synthesize findings from Tier 1 sub-agents into a preliminary set of classification labels.
    - You must output exactly ONE final classification block containing all labels.
    - Do NOT output bash commands or XML blocks outside the final classification.

    ## Synthesis Workflow
    **Step 1. Review Tier 1 Results**: Read the `{{tier1_summary}}` carefully.
    **Step 2. Judge Tier 1 Conclusions Against Their Evidence**:
    - Every final judgment must come from evidence already submitted by the Tier 1 agents. Do NOT introduce new evidence or new assumptions.
    - For each Tier 1 conclusion, check whether that agent's quoted evidence actually supports its own final judgment.
    - If a Tier 1 agent's evidence clearly supports its conclusion, keep that conclusion unchanged.
    - If a Tier 1 agent's evidence does NOT support its conclusion, do NOT blindly preserve the label. Drop the label.
    **Step 3. Gather Final Supported Labels**:
    - Add `SC` only when the PR Scope agent's submitted evidence actually shows extra unrelated scope. Do NOT add `SC` from extra tests alone.
    - Add `IS` only when the Issue agent's submitted evidence actually shows issue-detail supplementation or issue-scope evolution before merge.
    - Add `DP` or `FP` only when the PR Connection agent's submitted evidence actually supports that chain.
    - Add `UL` only when the PR Scope agent's submitted evidence actually shows a literal that is not specified in the issue.
    - Consider `Others` only after reviewing all Tier 1 evidence together. Add `Others` ONLY if the combined submitted evidence shows a clear textual mismatch that does not fit SC/FP/DP/IS/UL.
    **Step 4. Handle Empty/Clean**: If all Tier 1 conclusions fail on their own evidence, or all agents report no issues and there are no suspicious clues, apply `No Misalignment` (mutually exclusive with ALL other labels).

    ## Decision Rules
    1. All final labels must be traceable to Tier 1 submitted evidence.
    2. Prefer the label best supported by the actual evidence, not merely by the sub-agent's stated conclusion.
    3. If sub-agents disagree, prefer the one with stronger and more direct textual evidence.
    4. Non-functional-only differences (docs/comments/`.gitignore`/`.rst`) do NOT count as misalignment unless there is functional impact. Do NOT assign `Others` for pure refactoring/documentation changes.
    5. **Text evidence is PRIMARY.** DO NOT invent labels from pure code/test assumptions without supporting Tier 1 text evidence.
    6. You may revise a Tier 1 conclusion only when that same Tier 1 evidence clearly supports a different label or no label.

    ## Tier 1 Sub-Agent Results
    {{tier1_summary}}

    ## Output Format Requirement
    When finished, output your final classification EXACTLY as follows:

    - Output one `<classification>` block for EACH assigned label.
    - `label`: one of `SC`, `FP`, `DP`, `IS`, `UL`, `Others`, `No Misalignment`.
    - `reason`: **2-3 sentences** explaining the evidence aggregated from the Tier 1 sub-agents.
    - Output `No Misalignment` if and only if NO OTHER labels apply.

    Example:
    <classification>
    <label>SC</label>
    <reason>Sub-agent pr_scope_analyzer found explicit textual evidence in the PR description stating "also fixes #1234", while the target issue is #5678.</reason>
    </classification>

  action_observation_template: *action_observation_template
  format_error_template: *format_error_template
  timeout_template: *timeout_template
  step_limit: 1
  cost_limit: 0.7



## ============================================================
## Environment & model (shared)
## ============================================================

environment:
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'

model:
  observation_template: |
    {% if output.exception_info -%}
    <exception>{{output.exception_info}}</exception>
    {% endif -%}
    <returncode>{{output.returncode}}</returncode>
    {% if output.output | length < 10000 -%}
    <output>
    {{ output.output -}}
    </output>
    {%- else -%}
    <warning>
    The output of your last command was too long.
    Please try a different command that produces less output.
    If you're looking at a file you can try use head, tail or sed to view a smaller number of lines selectively.
    If you're using grep or find and it produced too much output, you can use a more selective search pattern.
    If you really need to see something from the full command's output, you can redirect output to a file and then search in that file.
    </warning>
    {%- set elided_chars = output.output | length - 10000 -%}
    <output_head>
    {{ output.output[:5000] }}
    </output_head>
    <elided_chars>
    {{ elided_chars }} characters elided
    </elided_chars>
    <output_tail>
    {{ output.output[-5000:] }}
    </output_tail>
    {%- endif -%}
  model_kwargs:
    drop_params: true
  format_error_template: |
    Format error:

    <error>
    {{error}}
    </error>

    Here is general guidance on how to format your response:

    Please always provide EXACTLY ONE action in triple backticks, found {{actions|length}} actions.
    If you want to end the task, please issue the following command: `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT`
    without any other command.
    Else, please format your response exactly as follows:

    <response_example>
    Here are some thoughts about why you want to perform the action.

    ```mswea_bash_command
    <action>
    ```
    </response_example>

    Note: In rare cases, if you need to reference a similar format in your command, you might have
    to proceed in two steps, first writing TRIPLEBACKTICKSBASH, then replacing them with ```mswea_bash_command.
